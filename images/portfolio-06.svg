  <rect x="155" y="280" width="60" height="30" rx="4" fill="#9b6b40" opacity="0.4"/>
  <rect x="245" y="280" width="90" height="30" rx="4" fill="#c8923c" opacity="0.6"/>
  <rect x="345" y="280" width="70" height="30" rx="4" fill="#b08050" opacity="0.5"/>
  <rect x="155" y="320" width="70" height="30" rx="4" fill="#b08050" opacity="0.5"/>
  <rect x="245" y="320" width="80" height="30" rx="4" fill="#c8923c" opacity="0.6"/>
  <rect x="345" y="320" width="60" height="30" rx="4" fill="#9b6b40" opacity="0.4"/>
  <!-- Shuttle -->
  <rect x="200" y="420" width="80" height="14" rx="7" fill="#a6762c" stroke="#8b5a20" stroke-width="1"/>
  <rect x="260" y="425" width="15" height="4" rx="2" fill="#e8c97a"/>
