<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efe8d8"/><stop offset="100%" stop-color="#e0d0b0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg6)"/>
  <!-- Weaving loom frame -->
  <rect x="100" y="120" width="400" height="380" rx="6" fill="none" stroke="#8b6a40" stroke-width="4"/>
  <!-- Warp threads vertical -->
  <line x1="160" y1="120" x2="160" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <line x1="220" y1="120" x2="220" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="120" x2="280" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="120" x2="340" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <line x1="400" y1="120" x2="400" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <line x1="440" y1="120" x2="440" y2="500" stroke="#c8a87c" stroke-width="1.5" opacity="0.6"/>
  <!-- Weft threads horizontal - woven pattern -->
  <rect x="155" y="240" width="90" height="30" rx="4" fill="#c8923c" opacity="0.6"/>
  <rect x="245" y="240" width="60" height="30" rx="4" fill="#b08050" opacity="0.5"/>
